{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            font-family: Poppins, sans-serif;
            margin: 0;
            background: #f4f6fb;
        }

        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: #ffffff;
            border-right: 1px solid #ddd;
            padding: 30px 20px;
        }

        .sidebar h3 {
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            margin-bottom: 15px;
            color: #333;
            text-decoration: none;
            font-weight: 500;
        }

        .sidebar a:hover {
            color: #4287f5;
        }

        /* Main content */
        .main-content {
            flex: 1;
            padding: 30px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        button {
            background: #1d2671;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #142057;
        }

        /* Cards */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgb(38, 31, 82);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .card-icon {
            font-size: 36px;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .card-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
            color: #ffffff;
        }

        .card-desc {
            font-size: 14px;
            color: #eeeeee;
        }

        .card-link {
            text-decoration: none;
            color: inherit;
        }
    </style>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

</head>

<body>

<div class="dashboard-container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>Menu</h3>
        <a href="#">Home</a>
        <a href="#">Certificate</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">

        <div class="top-bar">
            <h2>Welcome {{ request.user.username }}</h2>
            <a href="{% url 'logout' %}">
                <button>Logout</button>
            </a>
        </div>

        <!-- Cards -->
        <div class="cards-grid">

            <!-- Chapter 1 Liver Card -->
            <a href="{% url 'chap1' %}" class="card-link">
                <div class="card">
                    <div class="card-icon">
                        <i class="fas fa-book-medical"></i>
                    </div>
                    <div class="card-title">Chapter 1</div>
                    <div class="card-desc">BASIC ABDOMINAL ULTRASOUND IMAGING</div>
                </div>
            </a>

            <!-- Unit Cards Loop -->
            
           
                <div class="card">
                    <div class="card-icon">
                        <i class="fas fa-book"></i>
                    </div>
                    <div class="card-title">Unit {{ i }}</div>
                    <div class="card-desc">
                        Click to see topics and materials
                    </div>
                </div>
            </a>
            

        </div>

    </div>

</div>

</body>
</html>
